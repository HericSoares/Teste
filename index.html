<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Conteúdo Exclusivo</title>
<style>

    /* Vídeo de fundo cobrindo toda a tela */

    #bgvideo {

      position: fixed;

      top: 0;

      left: 0;

      width: 100vw;

      height: 100vh;

      z-index: -1;

      pointer-events: none;

    }

    body, html {

      margin: 0;

      padding: 0;

      width: 100%;

      height: 100%;

      overflow: hidden;

      font-family: Arial, sans-serif;

      color: #fff;

    }

    .content-wrapper {

      position: absolute;

      top: 50%;

      left: 50%;

      transform: translate(-50%, -50%);

      background: rgba(0, 0, 0, 0.6);

      padding: 30px 40px;

      border-radius: 8px;

      text-align: center;

      z-index: 1;

    }

    h1, h2, p {

      margin: 10px 0;

    }

    .btn {

      display: inline-block;

      padding: 15px 30px;

      font-size: 18px;

      border: none;

      border-radius: 5px;

      cursor: pointer;

      margin: 10px;

      text-decoration: none;

    }

    .btn-instagram {

      background-color: #E1306C;

      color: white;

    }

    .btn-instagram:hover {

      background-color: #C72E63;

    }

    .btn-linkedin {

      background-color: #0077B5;

      color: white;

    }

    .btn-linkedin:hover {

      background-color: #005983;

    }

    .btn-liberar {

      background-color: #4CAF50;

      color: white;

    }

    .btn-liberar:disabled {

      background-color: #aaa;

      cursor: not-allowed;

    }

    #conteudo {

      display: none;

      margin-top: 20px;

    }
</style>
</head>
<body>
<!-- Vimeo em background -->
<iframe

    id="bgvideo"

    src="https://player.vimeo.com/video/591754322?background=1&autoplay=1&loop=1&muted=1"

    frameborder="0"

    webkitallowfullscreen

    mozallowfullscreen

    allowfullscreen>
</iframe>
<div class="content-wrapper">
<h1>Conteúdo Exclusivo</h1>
<p>Siga nossas redes para liberar o conteúdo:</p>
<a

      class="btn btn-instagram"

      href="https://instagram.com/fanucsouthamerica"

      target="_blank"

      onclick="habilitarBotao()">

      Seguir @fanucsouthamerica
</a>
<a

      class="btn btn-linkedin"

      href="https://www.linkedin.com/company/fanucsouthamerica"

      target="_blank"

      onclick="habilitarBotao()">

      Seguir no LinkedIn
</a>
<br>
<button

      id="btnLiberar"

      class="btn btn-liberar"

      disabled

      onclick="gerarCodigo()">

      Já segui, mostrar código
</button>
<div id="conteudo">
<h2>Aqui está o seu código secreto:</h2>
<p id="codigoSecreto" style="font-size: 24px; font-weight: bold;"></p>
</div>
</div>
<script>

    // Habilita o botão "Já segui" ao clicar em qualquer rede social

    function habilitarBotao() {

      document.getElementById("btnLiberar").disabled = false;

    }

    // Gera um número aleatório de 4 dígitos e exibe na tela

    function gerarCodigo() {

      const codigo = Math.floor(Math.random() * 9000) + 1000; // 1000–9999

      document.getElementById("codigoSecreto").innerText = codigo;

      document.getElementById("conteudo").style.display = "block";

    }
</script>
</body>
</html>
