<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Conteúdo Exclusivo</title>
<style>

    body {

      font-family: Arial, sans-serif;

      text-align: center;

      padding-top: 80px;

      background-color: #f1f1f1;

    }

    h1, h2, p {

      color: #333;

    }

    .btn {

      padding: 15px 30px;

      font-size: 18px;

      border: none;

      border-radius: 5px;

      cursor: pointer;

      margin: 10px;

      text-decoration: none;

    }

    .btn-instagram {

      background-color: #E1306C;

      color: white;

    }

    .btn-instagram:hover {

      background-color: #C72E63;

    }

    .btn-linkedin {

      background-color: #0077B5;

      color: white;

    }

    .btn-linkedin:hover {

      background-color: #005983;

    }

    .btn-liberar {

      background-color: #4CAF50;

      color: white;

    }

    .btn-liberar:disabled {

      background-color: #aaa;

      cursor: not-allowed;

    }

    #conteudo {

      display: none;

      margin-top: 30px;

    }
</style>
</head>
<body>
<h1>Conteúdo Exclusivo</h1>
<p>Siga nossas redes para liberar o conteúdo:</p>
<a class="btn btn-instagram" href="https://instagram.com/fanucsouthamerica" target="_blank" onclick="habilitarBotao()">

    Seguir @fanucsouthamerica
</a>
<a class="btn btn-linkedin" href="https://www.linkedin.com/company/fanucsouthamerica" target="_blank" onclick="habilitarBotao()">

    Seguir no LinkedIn
</a>
<br>
<button id="btnLiberar" class="btn btn-liberar" disabled onclick="gerarCodigo()">

    Já segui, mostrar código
</button>
<div id="conteudo">
<h2>Aqui está o seu código secreto:</h2>
<p id="codigoSecreto"></p>
</div>
<script>

    // Habilita o botão "Já segui" quando um dos botões de redes sociais é clicado

    function habilitarBotao() {

      document.getElementById("btnLiberar").disabled = false;

    }

    // Gera um número aleatório de 4 dígitos e exibe na tela

    function gerarCodigo() {

      const codigo = Math.floor(Math.random() * 9000) + 1000; // Gera um número entre 1000 e 9999

      document.getElementById("codigoSecreto").innerText = codigo;

      document.getElementById("conteudo").style.display = "block";

    }
</script>
</body>
</html>
